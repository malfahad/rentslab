<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; line-height: 1.55; color: #171717; margin: 0; padding: 0; background: #fafafa; }
    .shell { max-width: 560px; margin: 0 auto; padding: 32px 20px; }
    .card { background: #fff; border-radius: 8px; padding: 28px 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 16px; }
    p { margin: 0 0 14px; }
    .muted { color: #525252; font-size: 14px; }
    .btn { display: inline-block; padding: 12px 20px; background: #2563eb; color: #fff !important; text-decoration: none; border-radius: 6px; font-weight: 500; }
    .btn-wrap { margin: 20px 0; }
    pre, .token-block { background: #f4f4f5; padding: 14px; border-radius: 6px; font-size: 13px; overflow-x: auto; word-break: break-all; white-space: pre-wrap; margin: 16px 0; }
    a { color: #2563eb; }
  </style>
</head>
<body>
<div class="shell">
  <div class="card">
    {% block body %}{% endblock %}
  </div>
  {% include "emailer/_footer.html" %}
</div>
</body>
</html>
